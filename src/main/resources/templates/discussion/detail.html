<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discussion – SHG Financial Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/theme.css}">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" th:href="@{/css/responsive.css}">
</head>
<body>

<!-- Navbar -->
<nav class="navbar top-navbar px-3">
  <div class="d-flex align-items-center gap-3">
    <button class="btn btn-link text-white p-0 d-md-none" id="sidebar-toggle"><i class="bi bi-list fs-4"></i></button>
    <a href="/dashboard" class="navbar-brand-custom"><i class="bi bi-people-fill"></i> SHG Tracker</a>
  </div>
  <div class="d-flex align-items-center gap-3 ms-auto">
    <button class="btn btn-link text-white p-0" data-action="toggle-dark"><i class="bi bi-moon-stars"></i></button>
    <div class="dropdown">
      <button class="btn btn-link text-white p-0 d-flex align-items-center gap-2" data-bs-toggle="dropdown">
        <div class="avatar" id="nav-user-initials" style="width:34px;height:34px;font-size:.85rem">U</div>
        <div class="d-none d-md-block">
          <div style="font-size:.85rem;font-weight:600;color:#fff" id="nav-user-name">User</div>
        </div>
      </button>
      <ul class="dropdown-menu dropdown-menu-end">
        <li><a class="dropdown-item text-danger" href="#" data-action="logout"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Sidebar -->
<nav class="sidebar" id="sidebar">
  <div class="pt-3">
    <div class="nav-section">Main</div>
    <a href="/dashboard" class="nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <div class="nav-section mt-2">Finance</div>
    <a href="/finance/transactions" class="nav-link"><i class="bi bi-arrow-left-right"></i> Transactions</a>
    <a href="/finance/reports" class="nav-link"><i class="bi bi-bar-chart-line"></i> Reports</a>
    <a href="/finance/analytics" class="nav-link"><i class="bi bi-pie-chart"></i> Analytics</a>
    <div class="nav-section mt-2">Advisory</div>
    <a href="/advisory/investments" class="nav-link"><i class="bi bi-bank"></i> Investment Plans</a>
    <a href="/advisory/schemes" class="nav-link"><i class="bi bi-building-check"></i> Govt Schemes</a>
    <a href="/advisory/recommendations" class="nav-link"><i class="bi bi-lightbulb"></i> Recommendations</a>
    <div class="nav-section mt-2">Community</div>
    <a href="/discussion/list" class="nav-link active"><i class="bi bi-chat-dots"></i> Discussions</a>
    <div class="nav-section mt-2" data-role-requires="admin">Admin</div>
    <a href="/admin/brokers" class="nav-link" data-role-requires="admin"><i class="bi bi-person-badge"></i> Broker Verification</a>
    <a href="/admin/statistics" class="nav-link" data-role-requires="admin"><i class="bi bi-graph-up"></i> Statistics</a>
    <a href="/admin/settings" class="nav-link" data-role-requires="admin"><i class="bi bi-gear"></i> Settings</a>
  </div>
</nav>

<!-- Main -->
<main class="main-content">
  <div class="breadcrumb-custom">
    <a href="/dashboard"><i class="bi bi-house me-1"></i>Home</a>
    <span class="sep">/</span>
    <a href="/discussion/list">Discussions</a>
    <span class="sep">/</span><span>Detail</span>
  </div>

  <!-- Discussion Header -->
  <div class="content-card mb-3" id="disc-detail-header">
    <div class="d-flex align-items-start gap-3">
      <div class="avatar" style="width:48px;height:48px;font-size:1.1rem;flex-shrink:0">U</div>
      <div class="flex-grow-1">
        <h4 class="fw-bold mb-1" id="disc-detail-title">Loading…</h4>
        <div class="d-flex gap-3 text-muted small">
          <span><i class="bi bi-person me-1"></i><span id="disc-detail-author">—</span></span>
          <span><i class="bi bi-clock me-1"></i><span id="disc-detail-date">—</span></span>
          <span class="badge-custom badge-savings" id="disc-detail-cat">—</span>
        </div>
      </div>
      <a href="/discussion/list" class="btn-outline-custom btn-sm flex-shrink-0">
        <i class="bi bi-arrow-left me-1"></i>Back
      </a>
    </div>
    <hr>
    <p id="disc-detail-body" class="mb-0 text-muted">—</p>
  </div>

  <!-- Comments -->
  <div class="content-card mb-3">
    <div class="card-title-bar">
      <h5><i class="bi bi-chat-left-text me-2"></i>Comments</h5>
    </div>
    <div id="comments-container">
      <div class="text-center py-3"><div class="spinner-border spinner-border-sm"></div></div>
    </div>
  </div>

  <!-- Add Comment -->
  <div class="content-card">
    <div class="card-title-bar">
      <h5><i class="bi bi-pencil me-2"></i>Add Comment</h5>
    </div>
    <form id="add-comment-form">
      <div class="mb-3">
        <textarea class="form-control" id="comment-text" rows="3" placeholder="Write your comment…" required></textarea>
      </div>
      <button type="submit" class="btn-primary-custom">
        <i class="bi bi-send me-1"></i>Post Comment
      </button>
    </form>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/utils.js}"></script>
<script th:src="@{/js/api.js}"></script>
<script th:src="@{/js/auth.js}"></script>
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/discussion.js}"></script>
</body>
</html>
