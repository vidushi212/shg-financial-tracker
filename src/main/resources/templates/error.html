<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error – SHG Financial Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/theme.css}">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <style>
    .error-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--gray-50);
    }
    .error-code {
      font-size: 6rem;
      font-weight: 700;
      color: var(--primary);
      line-height: 1;
    }
  </style>
</head>
<body>
<div class="error-wrapper">
  <div class="text-center p-4">
    <div class="error-code" th:text="${status ?: '404'}">404</div>
    <h2 class="mt-2 mb-1" th:text="${error ?: 'Page Not Found'}">Page Not Found</h2>
    <p class="text-muted mb-4" th:text="${message ?: 'The page you are looking for does not exist.'}">
      The page you are looking for does not exist.
    </p>
    <a href="/dashboard" class="btn-primary-custom me-2"><i class="bi bi-house me-1"></i>Go to Dashboard</a>
    <a href="/" class="btn-outline-custom"><i class="bi bi-box-arrow-in-right me-1"></i>Login</a>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
