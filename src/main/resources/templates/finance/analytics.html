<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics – SHG Financial Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/theme.css}">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" th:href="@{/css/responsive.css}">
</head>
<body>

<!-- Navbar -->
<nav class="navbar top-navbar px-3">
  <div class="d-flex align-items-center gap-3">
    <button class="btn btn-link text-white p-0 d-md-none" id="sidebar-toggle"><i class="bi bi-list fs-4"></i></button>
    <a href="/dashboard" class="navbar-brand-custom"><i class="bi bi-people-fill"></i> SHG Tracker</a>
  </div>
  <div class="d-flex align-items-center gap-3 ms-auto">
    <button class="btn btn-link text-white p-0" data-action="toggle-dark"><i class="bi bi-moon-stars"></i></button>
    <div class="dropdown">
      <button class="btn btn-link text-white p-0 d-flex align-items-center gap-2" data-bs-toggle="dropdown">
        <div class="avatar" id="nav-user-initials" style="width:34px;height:34px;font-size:.85rem">U</div>
        <div class="d-none d-md-block">
          <div style="font-size:.85rem;font-weight:600;color:#fff" id="nav-user-name">User</div>
          <div style="font-size:.72rem;color:#a7f3d0;text-transform:capitalize" id="nav-user-role">role</div>
        </div>
      </button>
      <ul class="dropdown-menu dropdown-menu-end">
        <li><a class="dropdown-item text-danger" href="#" data-action="logout"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Sidebar -->
<nav class="sidebar" id="sidebar">
  <div class="pt-3">
    <div class="nav-section">Main</div>
    <a href="/dashboard" class="nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <div class="nav-section mt-2">Finance</div>
    <a href="/finance/transactions" class="nav-link"><i class="bi bi-arrow-left-right"></i> Transactions</a>
    <a href="/finance/reports" class="nav-link"><i class="bi bi-bar-chart-line"></i> Reports</a>
    <a href="/finance/analytics" class="nav-link active"><i class="bi bi-pie-chart"></i> Analytics</a>
    <div class="nav-section mt-2">Advisory</div>
    <a href="/advisory/investments" class="nav-link"><i class="bi bi-bank"></i> Investment Plans</a>
    <a href="/advisory/schemes" class="nav-link"><i class="bi bi-building-check"></i> Govt Schemes</a>
    <a href="/advisory/recommendations" class="nav-link"><i class="bi bi-lightbulb"></i> Recommendations</a>
    <div class="nav-section mt-2">Community</div>
    <a href="/discussion/list" class="nav-link"><i class="bi bi-chat-dots"></i> Discussions</a>
    <div class="nav-section mt-2" data-role-requires="admin">Admin</div>
    <a href="/admin/brokers" class="nav-link" data-role-requires="admin"><i class="bi bi-person-badge"></i> Broker Verification</a>
    <a href="/admin/statistics" class="nav-link" data-role-requires="admin"><i class="bi bi-graph-up"></i> Statistics</a>
    <a href="/admin/settings" class="nav-link" data-role-requires="admin"><i class="bi bi-gear"></i> Settings</a>
  </div>
</nav>

<!-- Main -->
<main class="main-content">
  <div class="breadcrumb-custom">
    <a href="/dashboard"><i class="bi bi-house me-1"></i>Home</a>
    <span class="sep">/</span><span>Finance</span><span class="sep">/</span><span>Analytics</span>
  </div>

  <div class="page-header">
    <h4><i class="bi bi-pie-chart me-2"></i>Financial Analytics</h4>
  </div>

  <div class="row g-3">
    <div class="col-md-6">
      <div class="content-card">
        <div class="card-title-bar"><h5>Income vs Expense</h5></div>
        <div class="chart-wrapper"><canvas id="pie-chart"></canvas></div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="content-card">
        <div class="card-title-bar"><h5>Monthly Trend</h5></div>
        <div class="chart-wrapper"><canvas id="trend-chart"></canvas></div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script th:src="@{/js/utils.js}"></script>
<script th:src="@{/js/api.js}"></script>
<script th:src="@{/js/auth.js}"></script>
<script th:src="@{/js/app.js}"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (typeof Auth !== 'undefined') Auth.requireAuth();

  new Chart(document.getElementById('pie-chart'), {
    type: 'doughnut',
    data: {
      labels: ['Savings', 'Loans', 'Expenses'],
      datasets: [{ data: [77000, 48000, 12000],
        backgroundColor: ['#16a34a', '#2563eb', '#dc2626'] }]
    },
    options: { responsive: true, maintainAspectRatio: false,
               plugins: { legend: { position: 'bottom' } } }
  });

  new Chart(document.getElementById('trend-chart'), {
    type: 'line',
    data: {
      labels: ['Jan','Feb','Mar','Apr','May','Jun'],
      datasets: [
        { label:'Savings',  data:[22000,24000,25000,23000,27000,26000], borderColor:'#16a34a', fill:false, tension:.3 },
        { label:'Expenses', data:[3000,2500,4500,2000,3500,4000],       borderColor:'#dc2626', fill:false, tension:.3 }
      ]
    },
    options: { responsive: true, maintainAspectRatio: false,
               plugins: { legend: { position: 'top' } }, scales: { y: { beginAtZero: true } } }
  });
});
</script>
</body>
</html>
