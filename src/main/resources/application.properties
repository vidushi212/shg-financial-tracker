# Server Configuration
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/

# Default local database configuration
# The application now runs out-of-the-box on H2. To use MySQL, set SHG_DB_URL,
# SHG_DB_USERNAME, SHG_DB_PASSWORD, and SHG_DB_DRIVER_CLASS_NAME.
spring.datasource.url=${SHG_DB_URL:jdbc:h2:file:./data/shg_financial_db;MODE=MySQL;AUTO_SERVER=TRUE}
spring.datasource.username=${SHG_DB_USERNAME:sa}
spring.datasource.password=${SHG_DB_PASSWORD:}
spring.datasource.driver-class-name=${SHG_DB_DRIVER_CLASS_NAME:org.h2.Driver}

# JPA / Hibernate
spring.jpa.database-platform=${SHG_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never

# Application Name
spring.application.name=SHG Financial Tracker

# Logging
logging.level.root=INFO
logging.level.com.shg=DEBUG
logging.level.org.springframework.web=INFO

# Thymeleaf
spring.thymeleaf.cache=false

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Session
server.servlet.session.timeout=30m
